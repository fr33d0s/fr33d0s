<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 140" width="760" height="140" role="img" aria-label="özgür uk — software architect">
  <defs>
    <style>
      text { font-family: "JetBrains Mono","SF Mono","Menlo","Consolas",monospace; }
      .tag   { font-size: 9px;  letter-spacing: 0.48em; fill: #6b7280; text-transform: uppercase; }
      .name  { font-size: 30px; letter-spacing: 0.34em; fill: #f3f4f6; font-weight: 200; }
      .role  { font-size: 10px; letter-spacing: 0.54em; fill: #9ca3af; text-transform: uppercase; }
      .hair  { stroke: #4b5563; stroke-width: 0.6; }
      .tick  { stroke: #9ca3af; stroke-width: 1; }
    </style>
  </defs>

  <!-- top tag row -->
  <text class="tag" x="32"  y="22">fr33d0s</text>
  <text class="tag" x="728" y="22" text-anchor="end">2026</text>

  <!-- name block, center -->
  <text class="name" x="380" y="72" text-anchor="middle">Ö Z G Ü R   U K</text>

  <!-- precise rule with tick marks (architectural, not a waveform) -->
  <line class="hair" x1="140" y1="88" x2="620" y2="88" />
  <line class="tick" x1="140" y1="84" x2="140" y2="92" />
  <line class="tick" x1="380" y1="82" x2="380" y2="94" />
  <line class="tick" x1="620" y1="84" x2="620" y2="92" />

  <!-- role -->
  <text class="role" x="380" y="116" text-anchor="middle">software  architect   ·   istanbul</text>
</svg>
